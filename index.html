<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>@YukiGames - LinkBio</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        /* Animated Background Blobs */
        .bg-blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.6;
            animation: float 20s infinite ease-in-out;
            z-index: 0;
        }

        .blob-1 {
            width: 500px;
            height: 500px;
            background: #ff6b9d;
            top: -100px;
            left: -100px;
        }

        .blob-2 {
            width: 400px;
            height: 400px;
            background: #4facfe;
            bottom: -100px;
            right: -100px;
            animation-delay: -5s;
        }

        .blob-3 {
            width: 350px;
            height: 350px;
            background: #43e97b;
            top: 50%;
            left: 50%;
            animation-delay: -10s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            25% { transform: translate(50px, 100px); }
            50% { transform: translate(-50px, 50px); }
            75% { transform: translate(100px, -50px); }
        }

        /* Main Container */
        .container {
            position: relative;
            z-index: 1;
            max-width: 680px;
            width: 100%;
        }

        /* Profile Card */
        .profile-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 30px;
            padding: 50px 40px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            animation: fadeIn 0.8s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Avatar Container with Wings */
        .avatar-container {
            position: relative;
            width: 150px;
            height: 150px;
            margin: 0 auto 25px;
        }

        .avatar {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 5px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            object-fit: cover;
            animation: avatarPulse 3s ease-in-out infinite;
            position: relative;
            z-index: 2;
        }

        @keyframes avatarPulse {
            0%, 100% {
                box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            }
            50% {
                box-shadow: 0 10px 60px rgba(255, 255, 255, 0.4);
            }
        }

        /* Angel Wings */
        .wing {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 100px;
            height: 140px;
            z-index: 1;
            filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.8));
        }

        .wing-left {
            left: -80px;
            animation: wingFlap 3s ease-in-out infinite;
        }

        .wing-right {
            right: -80px;
            animation: wingFlap 3s ease-in-out infinite;
            animation-delay: 0.15s;
            transform: translateY(-50%) scaleX(-1);
        }

        @keyframes wingFlap {
            0%, 100% {
                transform: translateY(-50%) translateX(0) rotate(0deg);
                opacity: 0.9;
            }
            50% {
                transform: translateY(-50%) translateX(-5px) rotate(-5deg);
                opacity: 1;
            }
        }

        .wing-right {
            animation-name: wingFlapRight;
        }

        @keyframes wingFlapRight {
            0%, 100% {
                transform: translateY(-50%) scaleX(-1) translateX(0) rotate(0deg);
                opacity: 0.9;
            }
            50% {
                transform: translateY(-50%) scaleX(-1) translateX(5px) rotate(5deg);
                opacity: 1;
            }
        }

        /* Wing SVG */
        .wing svg {
            width: 100%;
            height: 100%;
            fill: rgba(255, 255, 255, 0.9);
        }

        /* Halo Ring */
        .halo {
            position: absolute;
            top: -30px;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 30px;
            border: 4px solid rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.8),
                        inset 0 0 20px rgba(255, 255, 255, 0.4);
            animation: haloGlow 2s ease-in-out infinite;
            z-index: 3;
        }

        @keyframes haloGlow {
            0%, 100% {
                box-shadow: 0 0 20px rgba(255, 255, 255, 0.8),
                            inset 0 0 20px rgba(255, 255, 255, 0.4);
                opacity: 0.8;
            }
            50% {
                box-shadow: 0 0 30px rgba(255, 255, 255, 1),
                            inset 0 0 30px rgba(255, 255, 255, 0.6);
                opacity: 1;
            }
        }

        /* Name & Bio */
        .name {
            font-size: 2.2em;
            font-weight: 800;
            color: #fff;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        .username {
            font-size: 1.1em;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 20px;
            font-weight: 500;
        }

        .bio {
            color: rgba(255, 255, 255, 0.9);
            font-size: 1em;
            line-height: 1.6;
            margin-bottom: 40px;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }

        /* Links Container */
        .links-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Link Button */
        .link-btn {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            padding: 18px 30px;
            color: #fff;
            text-decoration: none;
            font-weight: 600;
            font-size: 1.05em;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .link-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.6s;
        }

        .link-btn:hover::before {
            left: 100%;
        }

        .link-btn:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .link-btn:active {
            transform: translateY(-1px);
        }

        /* Icon */
        .link-icon {
            font-size: 1.4em;
        }

        /* Social Icons Row */
        .social-icons {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        .social-icon {
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            text-decoration: none;
            font-size: 1.3em;
            transition: all 0.3s ease;
        }

        .social-icon:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-5px) scale(1.1);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }

        /* Footer */
        .footer {
            text-align: center;
            margin-top: 30px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9em;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .profile-card {
                padding: 40px 25px;
            }

            .avatar-container {
                width: 120px;
                height: 120px;
            }

            .avatar {
                width: 120px;
                height: 120px;
            }

            .wing {
                width: 80px;
                height: 110px;
            }

            .wing-left {
                left: -60px;
            }

            .wing-right {
                right: -60px;
            }

            .halo {
                width: 100px;
                height: 25px;
                top: -25px;
            }

            .name {
                font-size: 1.8em;
            }

            .username {
                font-size: 1em;
            }

            .link-btn {
                padding: 16px 25px;
                font-size: 1em;
            }

            .social-icon {
                width: 45px;
                height: 45px;
                font-size: 1.2em;
            }
        }
    </style>
</head>
