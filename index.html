<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a1628">
<title>💦 Súng Nước 3D</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none;}
html,body{width:100%;height:100%;background:#0a1628;overflow:hidden;font-family:'Segoe UI',sans-serif;
  overscroll-behavior:none;overscroll-behavior-y:none;
  touch-action:none;position:fixed;
}
#c{position:fixed;top:0;left:0;width:100%;height:100%;touch-action:none;display:block;}
#ui{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10;}
.hud-top{position:absolute;top:0;left:0;width:100%;display:flex;justify-content:space-between;padding:10px 14px 0;}
.phud{display:flex;flex-direction:column;gap:3px;min-width:120px;}
.phud.right{align-items:flex-end;}
.pname{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;}
.pname.p1{color:#00e5ff;}.pname.p2{color:#ff6b6b;}
.hpbg{width:120px;height:9px;background:rgba(255,255,255,0.13);border-radius:5px;overflow:hidden;}
.hpfill{height:100%;border-radius:5px;transition:width .25s;}
.hpfill.p1{background:linear-gradient(90deg,#0096c7,#00e5ff);}
.hpfill.p2{background:linear-gradient(90deg,#ff4444,#ff8800);}
.hptxt{font-size:10px;color:rgba(255,255,255,0.55);font-weight:600;}
.wbg{width:90px;height:5px;background:rgba(255,255,255,0.1);border-radius:3px;overflow:hidden;}
.wfill{height:100%;border-radius:3px;background:linear-gradient(90deg,#0077b6,#90e0ef);transition:width .15s;}
.wlbl{font-size:9px;color:rgba(255,255,255,0.35);letter-spacing:1px;}
.center-hud{position:absolute;top:10px;left:50%;transform:translateX(-50%);text-align:center;}
.score{font-size:20px;font-weight:800;color:#fff;letter-spacing:4px;}
.round-lbl{font-size:9px;color:rgba(255,255,255,0.35);letter-spacing:3px;}
#joy-zone{position:absolute;bottom:20px;left:20px;width:130px;height:130px;pointer-events:all;z-index:20;border-radius:50%;background:rgba(255,255,255,0.06);border:2px solid rgba(255,255,255,0.15);}
#joy-knob{position:absolute;width:50px;height:50px;border-radius:50%;background:rgba(0,229,255,0.28);border:2px solid #00e5ff;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;}
#btn-fire{position:absolute;bottom:30px;right:20px;width:78px;height:78px;border-radius:50%;background:rgba(0,229,255,0.16);border:2.5px solid #00e5ff;display:flex;align-items:center;justify-content:center;font-size:30px;pointer-events:all;z-index:20;cursor:pointer;}
#btn-fire:active{background:rgba(0,229,255,0.42);transform:scale(0.87);}
#diff-wrap{position:absolute;bottom:125px;right:16px;display:flex;flex-direction:column;gap:5px;align-items:flex-end;pointer-events:all;z-index:20;}
.dlbl{font-size:9px;color:rgba(255,255,255,0.28);letter-spacing:2px;}
.dbtn{padding:4px 12px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:1px;border:1px solid rgba(255,255,255,0.16);background:rgba(0,0,0,0.28);color:rgba(255,255,255,0.4);cursor:pointer;pointer-events:all;}
.dbtn.on{background:rgba(255,180,0,0.2);border-color:#ffb400;color:#ffb400;}
#hit-flash{position:fixed;inset:0;pointer-events:none;opacity:0;transition:opacity .1s;z-index:15;}
#overlay{position:fixed;inset:0;background:rgba(4,8,18,0.93);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;z-index:50;}
#overlay h1{font-size:26px;font-weight:900;color:#fff;letter-spacing:3px;text-align:center;}
#overlay p{font-size:12px;color:rgba(255,255,255,0.48);text-align:center;max-width:260px;line-height:1.75;}
.obtn{padding:14px 42px;background:linear-gradient(135deg,#00b4d8,#0077b6);border:none;border-radius:30px;color:#fff;font-size:15px;font-weight:700;letter-spacing:2px;cursor:pointer;-webkit-appearance:none;margin-top:6px;}
.obtn:active{opacity:0.82;}
.win-txt{font-size:42px;font-weight:900;}
.win-p1{color:#00e5ff;}.win-p2{color:#ff6b6b;}
#err-box{display:none;position:fixed;bottom:10px;left:10px;right:10px;background:rgba(200,0,0,0.9);color:#fff;padding:10px 14px;border-radius:8px;font-size:12px;z-index:999;}
/* MAIN MENU */
#overlay{position:fixed;inset:0;background:rgba(4,8,18,0.96);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;z-index:50;}
.menu-logo{font-size:52px;margin-bottom:4px;}
.menu-title{font-size:28px;font-weight:900;color:#fff;letter-spacing:4px;margin-bottom:4px;}
.menu-sub{font-size:11px;color:rgba(255,255,255,0.35);letter-spacing:3px;margin-bottom:28px;}
.menu-btns{display:flex;flex-direction:column;gap:12px;width:220px;}
.mbtn{width:100%;padding:14px 0;border:none;border-radius:12px;font-size:14px;font-weight:700;letter-spacing:2px;cursor:pointer;-webkit-appearance:none;transition:opacity .15s,transform .1s;}
.mbtn:active{opacity:0.8;transform:scale(0.97);}
.mbtn-play{background:linear-gradient(135deg,#00b4d8,#0055a5);color:#fff;box-shadow:0 4px 18px rgba(0,150,220,0.35);}
.mbtn-shop{background:rgba(255,180,0,0.12);border:1.5px solid #ffb400;color:#ffb400;}
.mbtn-diff{background:rgba(255,255,255,0.06);border:1.5px solid rgba(255,255,255,0.18);color:rgba(255,255,255,0.6);}
.menu-diff-row{display:flex;gap:8px;justify-content:center;margin-top:2px;}
.mddbtn{flex:1;padding:8px 0;border-radius:8px;font-size:11px;font-weight:700;letter-spacing:1px;border:1px solid rgba(255,255,255,0.15);background:rgba(0,0,0,0.25);color:rgba(255,255,255,0.38);cursor:pointer;}
.mddbtn.on{background:rgba(255,180,0,0.2);border-color:#ffb400;color:#ffb400;}
/* WIN/LOSE overlay reuses #overlay but different content */
.win-txt{font-size:42px;font-weight:900;margin-bottom:8px;}
.win-p1{color:#00e5ff;}.win-p2{color:#ff6b6b;}
/* SHOP overlay */
#shop-overlay{position:fixed;inset:0;background:rgba(4,8,18,0.97);display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:60;}
.shop-title{font-size:22px;font-weight:900;color:#ffb400;letter-spacing:4px;}
.shop-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;max-width:320px;width:90%;}
.shop-card{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:14px;padding:18px 10px;display:flex;flex-direction:column;align-items:center;gap:8px;position:relative;}
.shop-icon{font-size:32px;}
.shop-name{font-size:11px;font-weight:700;color:rgba(255,255,255,0.7);letter-spacing:1px;text-align:center;}
.shop-badge{position:absolute;top:8px;right:8px;background:rgba(255,180,0,0.18);border:1px solid #ffb400;color:#ffb400;font-size:8px;font-weight:700;letter-spacing:1px;padding:2px 7px;border-radius:20px;}
.shop-back{padding:12px 36px;background:rgba(255,255,255,0.07);border:1.5px solid rgba(255,255,255,0.2);border-radius:30px;color:rgba(255,255,255,0.6);font-size:13px;font-weight:700;letter-spacing:2px;cursor:pointer;-webkit-appearance:none;}
.shop-back:active{opacity:0.7;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
  <div class="hud-top">
    <div class="phud">
      <div class="pname p1">⚡ BẠN</div>
      <div class="hpbg"><div class="hpfill p1" id="hp1" style="width:100%"></div></div>
      <div class="hptxt" id="hpT1">100 HP</div>
      <div class="wlbl">💧 NƯỚC</div>
      <div class="wbg"><div class="wfill" id="w1" style="width:100%"></div></div>
    </div>
    <div class="center-hud">
      <div class="round-lbl">SCORE</div>
      <div class="score" id="scoreD">0 — 0</div>
    </div>
    <div class="phud right">
      <div class="pname p2">BOT 🤖</div>
      <div class="hpbg"><div class="hpfill p2" id="hp2" style="width:100%"></div></div>
      <div class="hptxt" id="hpT2">100 HP</div>
      <div class="wlbl" style="text-align:right">NƯỚC 💧</div>
      <div class="wbg" style="align-self:flex-end"><div class="wfill" id="w2" style="width:100%"></div></div>
    </div>
  </div>
  <div id="joy-zone"><div id="joy-knob"></div></div>
  <div id="btn-fire">💦</div>
  <div id="diff-wrap">
    <div class="dlbl">ĐỘ KHÓ</div>
    <div class="dbtn" id="d-easy">DỄ</div>
    <div class="dbtn on" id="d-med">VỪA</div>
    <div class="dbtn" id="d-hard">KHÓ</div>
  </div>
  <div id="hit-flash"></div>
</div>
<div id="overlay">
  <div class="menu-logo">💦</div>
  <div class="menu-title">SÚNG NƯỚC 3D</div>
  <div class="menu-sub">WATER GUN ARENA</div>
  <div class="menu-btns">
    <button class="mbtn mbtn-play" id="start-btn">▶ CHƠI NGAY</button>
    <button class="mbtn mbtn-shop" id="shop-btn">🛒 SHOP</button>
    <div style="font-size:9px;color:rgba(255,255,255,0.25);text-align:center;letter-spacing:2px;margin-top:2px;">ĐỘ KHÓ</div>
    <div class="menu-diff-row">
      <div class="mddbtn" id="d-easy">DỄ</div>
      <div class="mddbtn on" id="d-med">VỪA</div>
      <div class="mddbtn" id="d-hard">KHÓ</div>
    </div>
  </div>
</div>

<!-- SHOP OVERLAY -->
<div id="shop-overlay">
  <div style="font-size:36px">🛒</div>
  <div class="shop-title">SHOP</div>
  <div class="shop-grid">
    <div class="shop-card">
      <div class="shop-icon">🔫</div>
      <div class="shop-name">SUPER SOAKER</div>
      <div class="shop-badge">SẮP RA</div>
    </div>
    <div class="shop-card">
      <div class="shop-icon">💎</div>
      <div class="shop-name">SKIN XÀ CỪ</div>
      <div class="shop-badge">SẮP RA</div>
    </div>
    <div class="shop-card">
      <div class="shop-icon">🎨</div>
      <div class="shop-name">TRANG PHỤC</div>
      <div class="shop-badge">SẮP RA</div>
    </div>
    <div class="shop-card">
      <div class="shop-icon">⚡</div>
      <div class="shop-name">TURBO MODE</div>
      <div class="shop-badge">SẮP RA</div>
    </div>
  </div>
  <div style="font-size:11px;color:rgba(255,255,255,0.3);letter-spacing:2px;">COMING SOON — ĐÓN CHỜ NHÉ!</div>
  <button class="shop-back" id="shop-back-btn">← QUAY LẠI</button>
</div>
<div id="err-box"></div>

<script>
// Load Three.js dynamically — initGame defined BEFORE script loads
function showErr(msg){
  var e=document.getElementById('err-box');
  e.style.display='block';e.textContent=msg;
}
window.onerror=function(msg,src,line){showErr('Lỗi JS: '+msg+' (dòng '+line+')');};

// Chặn pull-to-refresh và overscroll trên Android WebView
document.addEventListener('touchmove',function(e){e.preventDefault();},{passive:false});
document.addEventListener('touchstart',function(e){
  if(e.target.id!=='joy-zone'&&e.target.id!=='btn-fire'&&
     !e.target.classList.contains('mbtn')&&!e.target.classList.contains('dbtn')&&
     !e.target.classList.contains('mddbtn')&&!e.target.classList.contains('shop-back')&&
     !e.target.classList.contains('obtn')&&e.target.tagName!=='BUTTON'){
    // allow only on game controls
  }
},{passive:false});;

function initGame(){
try{

var W=window.innerWidth,H=window.innerHeight;
var canvas=document.getElementById('c');
var renderer=new THREE.WebGLRenderer({canvas:canvas,antialias:true});
renderer.setSize(W,H);
renderer.shadowMap.enabled=true;
renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.setPixelRatio(Math.min(devicePixelRatio,1.5));

var scene=new THREE.Scene();
scene.background=new THREE.Color(0x87ceeb);
scene.fog=new THREE.Fog(0x87ceeb,30,75);

var camera=new THREE.PerspectiveCamera(58,W/H,0.1,150);
camera.position.set(0,13,21);camera.lookAt(0,0,0);

// Lights
var sun=new THREE.DirectionalLight(0xfff5e0,1.4);
sun.position.set(10,20,8);sun.castShadow=true;
sun.shadow.mapSize.width=sun.shadow.mapSize.height=1024;
sun.shadow.camera.left=-22;sun.shadow.camera.right=22;
sun.shadow.camera.top=22;sun.shadow.camera.bottom=-22;
sun.shadow.camera.far=72;
scene.add(sun);
scene.add(new THREE.AmbientLight(0x9ec8f5,0.7));
var fl2=new THREE.DirectionalLight(0xaad4ff,0.35);fl2.position.set(-8,6,-10);scene.add(fl2);

function smat(c,r,m){return new THREE.MeshStandardMaterial({color:c,roughness:r||0.5,metalness:m||0});}

// Pool
var pool=new THREE.Mesh(new THREE.PlaneGeometry(34,23),
  new THREE.MeshStandardMaterial({color:0x0077b6,roughness:0.05,metalness:0.35,transparent:true,opacity:0.82}));
pool.rotation.x=-Math.PI/2;pool.receiveShadow=true;scene.add(pool);

// Walls
[[0,10.6,35,0.5],[0,-10.6,35,0.5],[16.4,0,0.5,22],[-16.4,0,0.5,22]].forEach(function(a){
  var m=new THREE.Mesh(new THREE.BoxGeometry(a[2],0.5,a[3]),smat(0xdde8f0,0.8));
  m.position.set(a[0],0.25,a[1]);m.receiveShadow=true;m.castShadow=true;scene.add(m);
});

// Obstacles
var OBS=[];
[[-5,2,0xff9f43],[5,-2,0x54a0ff],[-2,-5,0xff6b6b],[2,5,0x1dd1a1],[0,0,0xfeca57]].forEach(function(a){
  var m=new THREE.Mesh(new THREE.CylinderGeometry(0.55,0.65,2.6,10),smat(a[2],0.65));
  m.position.set(a[0],1.3,a[1]);m.castShadow=true;m.receiveShadow=true;scene.add(m);
  OBS.push({x:a[0],z:a[1],r:0.9});
});
for(var ci=0;ci<7;ci++){
  var cl=new THREE.Mesh(new THREE.SphereGeometry(1.3+Math.random()*1.6,7,5),smat(0xffffff,1));
  cl.position.set(-17+ci*6,13+Math.random()*3,-12+Math.random()*5);scene.add(cl);
}

// Water gun model
function makeGun(pCol,aCol){
  var g=new THREE.Group();
  var bM=smat(pCol,0.3,0.2),aM=smat(aCol,0.2,0.35),dM=smat(0x111827,0.6),
      cM=smat(0xd0e8ff,0.08,0.9),rM=smat(0x1c1c1c,0.95),
      glM=new THREE.MeshStandardMaterial({color:0x90e0ef,roughness:0.05,transparent:true,opacity:0.55});
  var recv=new THREE.Mesh(new THREE.BoxGeometry(1.7,0.26,0.2),bM);recv.position.x=0.15;recv.castShadow=true;g.add(recv);
  var rail=new THREE.Mesh(new THREE.BoxGeometry(1.5,0.055,0.16),dM);rail.position.set(0.15,0.158,0);g.add(rail);
  for(var ri=0;ri<6;ri++){var rn=new THREE.Mesh(new THREE.BoxGeometry(0.038,0.065,0.17),dM);rn.position.set(-0.42+ri*0.17,0.162,0);g.add(rn);}
  var sh=new THREE.Mesh(new THREE.CylinderGeometry(0.085,0.085,1.35,12),bM);sh.rotation.z=Math.PI/2;sh.position.set(0.88,0,0);sh.castShadow=true;g.add(sh);
  var ib=new THREE.Mesh(new THREE.CylinderGeometry(0.052,0.052,1.42,10),cM);ib.rotation.z=Math.PI/2;ib.position.set(0.88,0,0);g.add(ib);
  var mz=new THREE.Mesh(new THREE.CylinderGeometry(0.1,0.085,0.09,12),aM);mz.rotation.z=Math.PI/2;mz.position.set(1.6,0,0);g.add(mz);
  var mzh=new THREE.Mesh(new THREE.CylinderGeometry(0.036,0.036,0.11,8),dM);mzh.rotation.z=Math.PI/2;mzh.position.set(1.61,0,0);g.add(mzh);
  for(var vi=0;vi<4;vi++){[0.085,-0.085].forEach(function(oy){var v=new THREE.Mesh(new THREE.CylinderGeometry(0.02,0.02,0.19,6),dM);v.position.set(0.45+vi*0.22,oy,0);g.add(v);});}
  var scb=new THREE.Mesh(new THREE.CylinderGeometry(0.048,0.048,0.35,10),dM);scb.rotation.z=Math.PI/2;scb.position.set(0.12,0.22,0);g.add(scb);
  [0.29,-0.07].forEach(function(sx){var l=new THREE.Mesh(new THREE.CylinderGeometry(0.044,0.044,0.018,10),glM);l.rotation.z=Math.PI/2;l.position.set(sx,0.22,0);g.add(l);});
  var tur=new THREE.Mesh(new THREE.CylinderGeometry(0.022,0.022,0.07,7),cM);tur.position.set(0.12,0.275,0);g.add(tur);
  var tank=new THREE.Mesh(new THREE.BoxGeometry(0.6,0.32,0.24),glM);tank.position.set(-0.22,0.04,0);g.add(tank);
  var tf=new THREE.Mesh(new THREE.BoxGeometry(0.56,0.22,0.2),new THREE.MeshStandardMaterial({color:0x0096c7,roughness:0.1,transparent:true,opacity:0.5}));tf.position.set(-0.22,0.01,0);g.add(tf);
  var tc=new THREE.Mesh(new THREE.CylinderGeometry(0.055,0.055,0.055,8),aM);tc.position.set(-0.22,0.22,0);g.add(tc);
  var tst=new THREE.Mesh(new THREE.BoxGeometry(0.56,0.052,0.25),aM);tst.position.set(-0.22,0.04,0);g.add(tst);
  var grp=new THREE.Group();grp.position.set(-0.28,-0.04,0);grp.rotation.z=-0.2;
  var gm=new THREE.Mesh(new THREE.BoxGeometry(0.16,0.46,0.18),dM);gm.position.y=-0.23;grp.add(gm);
  for(var gi=0;gi<5;gi++){var gr=new THREE.Mesh(new THREE.BoxGeometry(0.165,0.012,0.19),rM);gr.position.y=-0.08+gi*0.07;grp.add(gr);}
  g.add(grp);
  var trig=new THREE.Mesh(new THREE.BoxGeometry(0.032,0.1,0.055),cM);trig.position.set(-0.19,-0.12,0);trig.rotation.z=0.22;g.add(trig);
  var pr=new THREE.Mesh(new THREE.CylinderGeometry(0.032,0.032,0.88,8),cM);pr.rotation.z=Math.PI/2;pr.position.set(0.43,-0.14,0);g.add(pr);
  var pg=new THREE.Mesh(new THREE.BoxGeometry(0.26,0.082,0.16),rM);pg.position.set(0.5,-0.14,0);g.add(pg);
  var bro=new THREE.Mesh(new THREE.CylinderGeometry(0.022,0.022,0.095,6),cM);bro.rotation.x=Math.PI/2;bro.position.set(0.38,0.055,0.11);g.add(bro);
  var bkn=new THREE.Mesh(new THREE.SphereGeometry(0.036,6,5),cM);bkn.position.set(0.38,0.055,0.17);g.add(bkn);
  var ep=new THREE.Mesh(new THREE.BoxGeometry(0.3,0.1,0.21),aM);ep.position.set(0.08,0,0);g.add(ep);
  // Muzzle flash
  var fgrp=new THREE.Group();fgrp.visible=false;
  var fc=new THREE.Mesh(new THREE.SphereGeometry(0.11,8,6),new THREE.MeshStandardMaterial({color:0xffd700,emissive:0xff8c00,emissiveIntensity:3,transparent:true,opacity:0.95}));fc.position.set(1.66,0,0);
  var fs=new THREE.Mesh(new THREE.ConeGeometry(0.055,0.26,6),new THREE.MeshStandardMaterial({color:0xff6600,emissive:0xff3300,emissiveIntensity:2,transparent:true,opacity:0.85}));fs.rotation.z=-Math.PI/2;fs.position.set(1.82,0,0);
  fgrp.add(fc,fs);g.add(fgrp);g.flash=fgrp;
  return g;
}

// Character factory with skeleton bones
function makeChar(bCol,gP,gA){
  var root=new THREE.Group();
  var bM=smat(bCol,0.65,0.05),skM=smat(0xf5cba7,0.85),btM=smat(0x1a1a2e,0.8),vsM=smat(0x2c3e50,0.72);
  var hip=new THREE.Group();hip.position.y=0.82;root.add(hip);
  var legs=[];
  [-0.14,0.14].forEach(function(lx){
    var thigh=new THREE.Group();thigh.position.set(lx,0,0);hip.add(thigh);
    var thM=new THREE.Mesh(new THREE.CylinderGeometry(0.13,0.115,0.44,8),bM);thM.position.y=-0.22;thM.castShadow=true;thigh.add(thM);
    var shin=new THREE.Group();shin.position.y=-0.44;thigh.add(shin);
    var shM=new THREE.Mesh(new THREE.CylinderGeometry(0.11,0.09,0.42,8),bM);shM.position.y=-0.21;shM.castShadow=true;shin.add(shM);
    var boot=new THREE.Mesh(new THREE.BoxGeometry(0.17,0.13,0.27),btM);boot.position.set(0,-0.46,0.03);shin.add(boot);
    legs.push({thigh:thigh,shin:shin});
  });
  var torso=new THREE.Group();torso.position.y=0.05;hip.add(torso);
  var toM=new THREE.Mesh(new THREE.BoxGeometry(0.65,0.6,0.36),bM);toM.position.y=0.3;toM.castShadow=true;torso.add(toM);

// Tiếng bắn súng nước — phụt nước mạnh
function sndShoot(){
  try{
    var ac=getAC();var t=ac.currentTime;
    // Noise burst filtered to water sound
    var len=ac.sampleRate*0.22;
    var buf=ac.createBuffer(1,len,ac.sampleRate);
    var d=buf.getChannelData(0);
    for(var i=0;i<len;i++){
      var env=Math.pow(1-i/len,1.2);
      d[i]=(Math.random()*2-1)*env;
    }
    var src=ac.createBufferSource();src.buffer=buf;
    // Bandpass: water whoosh ~600-1200Hz
    var bp=ac.createBiquadFilter();bp.type='bandpass';bp.frequency.value=700;bp.Q.value=0.6;
    // Highpass to cut rumble
    var hp=ac.createBiquadFilter();hp.type='highpass';hp.frequency.value=400;
    var g=ac.createGain();
    g.gain.setValueAtTime(0.7,t);
    g.gain.exponentialRampToValueAtTime(0.001,t+0.22);
    src.connect(hp);hp.connect(bp);bp.connect(g);g.connect(ac.destination);
    src.start(t);src.stop(t+0.22);
    // Short pitch swoosh at start
    var osc=ac.createOscillator();osc.type='sine';
    osc.frequency.setValueAtTime(280,t);
    osc.frequency.exponentialRampToValueAtTime(120,t+0.1);
    var og=ac.createGain();og.gain.setValueAtTime(0.15,t);og.gain.exponentialRampToValueAtTime(0.001,t+0.1);
    osc.connect(og);og.connect(ac.destination);osc.start(t);osc.stop(t+0.1);
  }catch(e){}
}

    var osc=ac.createOscillator();osc.type='sine';
    osc.frequency.setValueAtTime(220,t);
    osc.frequency.exponentialRampToValueAtTime(55,t+0.14);
    var g=ac.createGain();g.gain.setValueAtTime(0.9,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.18);
    osc.connect(g);g.connect(ac.destination);osc.start(t);osc.stop(t+0.18);

function updPlayer(){var p=G.p;if(p.cd>0)p.cd--;var ix=jDx,iz=jDy;if(kb['w']||kb['W']||kb['ArrowUp'])iz=-1;if(kb['s']||kb['S']||kb['ArrowDown'])iz=1;if(kb['a']||kb['A']||kb['ArrowLeft'])ix=-1;if(kb['d']||kb['D']||kb['ArrowRight'])ix=1;var len=Math.sqrt(ix*ix+iz*iz);p.mv=len>0.12;if(p.mv){var spd=Math.min(len,1)*0.1;var nx=p.x+(ix/Math.max(len,1))*spd*1.1,nz=p.z+(iz/Math.max(len,1))*spd*1.1;nx=Math.max(-15.5,Math.min(15.5,nx));nz=Math.max(-9.5,Math.min(9.5,nz));var bl=false;for(var oi=0;oi<OBS.length;oi++)if(cc(nx,nz,OBS[oi].x,OBS[oi].z,OBS[oi].r+0.6)){bl=true;break;}if(!bl){p.x=nx;p.z=nz;}}p.a=Math.atan2(G.bot.x-p.x,G.bot.z-p.z);P1.position.set(p.x,0,p.z);P1.rotation.y=p.a;}

// Bullets + particles
function updBullets(){
  for(var i=G.bullets.length-1;i>=0;i--){
    var b=G.bullets[i];
    if(!b||!b.mesh)continue;
    b.mesh.position.x+=b.vx;b.mesh.position.z+=b.vz;b.life--;
    if(Math.abs(b.mesh.position.x)>15.5)b.vx*=-0.7;
    if(Math.abs(b.mesh.position.z)>9.5)b.vz*=-0.7;
    var dead=false;
    for(var oi=0;oi<OBS.length;oi++){
      if(cc(b.mesh.position.x,b.mesh.position.z,OBS[oi].x,OBS[oi].z,1.05)){
        spawnParts(b.mesh.position,0x90e0ef,6);sndSplash();dead=true;break;
      }
    }
    if(!dead){
      var tgt=b.owner===1?G.bot:G.p;
      if(cc(b.mesh.position.x,b.mesh.position.z,tgt.x,tgt.z,0.85)){
        tgt.hp=Math.max(0,tgt.hp-13);
        spawnParts(b.mesh.position,b.owner===1?0x00e5ff:0xff4444,18);
        hitFlash(b.owner===1?'#ff4444':'#00b4d8');
        updHP(b.owner===1?2:1);
        sndHit();
        dead=true;
        if(tgt.hp<=0){endRound(b.owner);return;}
      }
    }
    if(dead||b.life<=0){relBul(b.mesh);G.bullets.splice(i,1);}
  }
}

var wT=0;function tickW(){wT++;if(wT%55===0){if(G.p.w<100){G.p.w=Math.min(100,G.p.w+6);updW(1);sndRefill();}if(G.bot.w<100){G.bot.w=Math.min(100,G.bot.w+6);updW(2);}}}

// UI
function updHP(pl){var h=pl===1?G.p.hp:G.bot.hp;document.getElementById('hp'+pl).style.width=h+'%';document.getElementById('hpT'+pl).textContent=h+' HP';}
function updW(pl){document.getElementById('w'+pl).style.width=(pl===1?G.p.w:G.bot.w)+'%';}
function hitFlash(col){var f=document.getElementById('hit-flash');f.style.background=col+'28';f.style.opacity='1';setTimeout(function(){f.style.opacity='0';},130);}
function setDiff(d){DIFF=d;['easy','med','hard'].forEach(function(x){document.getElementById('d-'+x).classList.toggle('on',x===d);});}

// Round management
function endRound(winner){
  G.on=false;if(winner===1)G.s1++;else G.s2++;
  if(winner===1)sndWin();else sndLose();
  document.getElementById('scoreD').textContent=G.s1+' — '+G.s2;
  for(var i=0;i<G.bullets.length;i++)relBul(G.bullets[i].mesh);G.bullets=[];
  var ov=document.getElementById('overlay');
  ov.innerHTML=winner===1
    ?'<div class="win-txt win-p1">🎉 THẮNG!</div><p style="color:rgba(255,255,255,.5);margin-bottom:20px">Bạn đã hạ bot!<br>Tỷ số: '+G.s1+' — '+G.s2+'</p><div class="menu-btns"><button class="mbtn mbtn-play" id="start-btn">▶ CHƠI LẠI</button><button class="mbtn mbtn-shop" id="menu-btn">🏠 MENU</button></div>'
    :'<div class="win-txt win-p2">😵 THUA!</div><p style="color:rgba(255,255,255,.5);margin-bottom:20px">Bot thắng rồi!<br>Tỷ số: '+G.s1+' — '+G.s2+'</p><div class="menu-btns"><button class="mbtn mbtn-play" id="start-btn">▶ THỬ LẠI</button><button class="mbtn mbtn-shop" id="menu-btn">🏠 MENU</button></div>';
  ov.style.display='flex';
  bindStart();
  var mb=document.getElementById('menu-btn');
  if(mb){
    mb.addEventListener('click',showMainMenu);
    mb.addEventListener('touchend',function(e){e.preventDefault();showMainMenu();},{passive:false});
  }
}

function showMainMenu(){
  var ov=document.getElementById('overlay');
  ov.innerHTML='<div class="menu-logo">💦</div><div class="menu-title">SÚNG NƯỚC 3D</div><div class="menu-sub">WATER GUN ARENA</div><div class="menu-btns"><button class="mbtn mbtn-play" id="start-btn">▶ CHƠI NGAY</button><button class="mbtn mbtn-shop" id="shop-btn2">🛒 SHOP</button><div style="font-size:9px;color:rgba(255,255,255,0.25);text-align:center;letter-spacing:2px;margin-top:2px;">ĐỘ KHÓ</div><div class="menu-diff-row"><div class="mddbtn '+(DIFF==='easy'?'on':'')+'" id="d-easy2">DỄ</div><div class="mddbtn '+(DIFF==='med'?'on':'')+'" id="d-med2">VỪA</div><div class="mddbtn '+(DIFF==='hard'?'on':'')+'" id="d-hard2">KHÓ</div></div></div>';
  ov.style.display='flex';
  bindStart();
  var sb=document.getElementById('shop-btn2');
  if(sb){sb.addEventListener('click',function(){document.getElementById('shop-overlay').style.display='flex';});sb.addEventListener('touchend',function(e){e.preventDefault();document.getElementById('shop-overlay').style.display='flex';},{passive:false});}
  ['easy','med','hard'].forEach(function(d){var b=document.getElementById('d-'+d+'2');if(!b)return;b.addEventListener('click',function(){setDiff(d);['easy','med','hard'].forEach(function(x){var el=document.getElementById('d-'+x+'2');if(el)el.classList.toggle('on',x===d);});});b.addEventListener('touchend',function(e){e.preventDefault();setDiff(d);['easy','med','hard'].forEach(function(x){var el=document.getElementById('d-'+x+'2');if(el)el.classList.toggle('on',x===d);});},{passive:false});});
}
function startGame(){
  G.p.hp=100;G.p.w=100;G.p.x=-7;G.p.z=0;G.p.a=0;G.p.cd=0;G.p.mv=false;
  G.bot.hp=100;G.bot.w=100;G.bot.x=7;G.bot.z=0;G.bot.a=Math.PI;G.bot.cd=0;G.bot.st='chase';G.bot.stm=60;G.bot.mv=false;
  for(var i=0;i<G.bullets.length;i++)relBul(G.bullets[i].mesh);G.bullets=[];
  for(var i=0;i<PARTS.length;i++)scene.remove(PARTS[i]);PARTS=[];
  updHP(1);updHP(2);updW(1);updW(2);
  document.getElementById('overlay').style.display='none';
  G.on=true;wT=0;
}
function bindStart(){
  var btn=document.getElementById('start-btn');
  if(!btn)return;
  btn.addEventListener('click',startGame);
  btn.addEventListener('touchend',function(e){e.preventDefault();e.stopPropagation();startGame();},{passive:false});
}

// Diff buttons
['easy','med','hard'].forEach(function(d){
  var btn=document.getElementById('d-'+d);
  if(!btn)return;
  btn.addEventListener('click',function(){setDiff(d);});
  btn.addEventListener('touchend',function(e){e.preventDefault();setDiff(d);},{passive:false});
});

// Shop button
var shopBtn=document.getElementById('shop-btn');
var shopOv=document.getElementById('shop-overlay');
var shopBack=document.getElementById('shop-back-btn');
if(shopBtn){
  shopBtn.addEventListener('click',function(){shopOv.style.display='flex';});
  shopBtn.addEventListener('touchend',function(e){e.preventDefault();shopOv.style.display='flex';},{passive:false});
}
if(shopBack){
  shopBack.addEventListener('click',function(){shopOv.style.display='none';});
  shopBack.addEventListener('touchend',function(e){e.preventDefault();shopOv.style.display='none';},{passive:false});
}

bindStart();

// Main loop
var pT=0;
function loop(){
  requestAnimationFrame(loop);
  if(G.on){
    updPlayer();updBot();updBullets();updParts();tickW();pT+=0.016;
    animChar(P1,G.p.mv);animChar(P2,G.bot.mv);
    if(G.p.mv)sndWalk(pT);
    tickRecoil(P1);tickRecoil(P2);
    if(f1t>0){f1t--;if(f1t===0&&P1.flash)P1.flash.visible=false;}
    if(f2t>0){f2t--;if(f2t===0&&P2.flash)P2.flash.visible=false;}
    pool.material.color.setHSL(0.55+Math.sin(pT)*0.015,0.72,0.27+Math.sin(pT*0.8)*0.03);
    var mx=(G.p.x+G.bot.x)*0.5,mz=(G.p.z+G.bot.z)*0.5;
    camera.position.x+=(mx*0.15-camera.position.x)*0.04;
    camera.position.z+=(mz*0.1+21-camera.position.z)*0.04;
    camera.lookAt(mx,0,mz);
  }
  renderer.render(scene,camera);
}
loop();

window.addEventListener('resize',function(){var w=window.innerWidth,h=window.innerHeight;renderer.setSize(w,h);camera.aspect=w/h;camera.updateProjectionMatrix();});

}catch(err){showErr('Lỗi: '+err.message);console.error(err);}
} // end initGame

// Load Three.js — AFTER initGame is defined
var s=document.createElement('script');
s.src='https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js';
s.onload=function(){initGame();};
s.onerror=function(){showErr('Không tải được Three.js — kiểm tra kết nối mạng!');};
document.head.appendChild(s);
</script>
</body>
</html>
