<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>GameZone</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{--bg:#0d1117;--card:#161b22;--border:rgba(255,255,255,0.08);--acc:#6c63ff;--txt:#e6edf3;--txt2:#8b949e;--r:14px;}
html,body{width:100%;min-height:100%;background:var(--bg);color:var(--txt);font-family:'Nunito',sans-serif;overflow-x:hidden;}

.header{background:rgba(13,17,23,0.95);backdrop-filter:blur(16px);position:sticky;top:0;z-index:50;border-bottom:1px solid var(--border);padding:14px 16px 12px;}
.logo{font-size:22px;font-weight:900;color:#fff;letter-spacing:1px;margin-bottom:12px;}
.logo span{color:var(--acc);}
.search-box{display:flex;align-items:center;gap:10px;background:var(--card);border:1.5px solid var(--border);border-radius:12px;padding:10px 14px;transition:border-color .2s;}
.search-box:focus-within{border-color:var(--acc);}
.search-box input{flex:1;background:none;border:none;outline:none;color:var(--txt);font-family:'Nunito',sans-serif;font-size:14px;}
.search-box input::placeholder{color:var(--txt2);}
.clear-btn{font-size:16px;color:var(--txt2);cursor:pointer;display:none;}

.main{padding:16px;display:flex;flex-direction:column;gap:10px;}
.section-title{font-size:12px;font-weight:800;color:var(--txt2);letter-spacing:2px;text-transform:uppercase;margin:4px 0;}

.game-card{display:flex;gap:14px;align-items:center;background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px;cursor:pointer;transition:background .15s;}
.game-card:active{background:#1f2937;}
.g-icon{width:64px;height:64px;border-radius:14px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:32px;}
.g-info{flex:1;min-width:0;}
.g-name{font-size:15px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.g-dev{font-size:11px;color:var(--txt2);margin-top:2px;}
.g-meta{display:flex;align-items:center;gap:7px;margin-top:7px;flex-wrap:wrap;}
.g-stars{font-size:12px;color:#f9ca24;}
.g-rating{font-size:11px;color:var(--txt2);}
.g-size{font-size:11px;color:var(--txt2);}
.g-badge{font-size:9px;font-weight:800;padding:2px 8px;border-radius:6px;letter-spacing:.5px;}
.badge-free{background:rgba(67,233,123,0.15);color:#43e97b;}
.badge-hot{background:rgba(255,101,132,0.15);color:#ff6584;}
.badge-new{background:rgba(108,99,255,0.15);color:var(--acc);}
.dl-btn{padding:9px 16px;border-radius:10px;background:var(--acc);color:#fff;font-size:12px;font-weight:800;border:none;cursor:pointer;flex-shrink:0;}
.dl-btn:active{opacity:.75;}
.dl-btn.done{background:var(--card);color:var(--acc);border:1.5px solid var(--acc);}

.empty{text-align:center;padding:60px 20px;color:var(--txt2);}
.empty-ico{font-size:48px;margin-bottom:12px;}
.empty-txt{font-size:14px;font-weight:700;}

/* DETAIL */
#detail{position:fixed;inset:0;background:var(--bg);z-index:100;overflow-y:auto;transform:translateX(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);}
#detail.show{transform:translateX(0);}
.det-header{position:sticky;top:0;background:rgba(13,17,23,0.95);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:14px 16px;display:flex;align-items:center;gap:12px;z-index:10;}
.back-btn{width:36px;height:36px;border-radius:10px;background:var(--card);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;flex-shrink:0;}
.det-hd-title{font-size:16px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.det-hero{width:100%;height:200px;display:flex;align-items:center;justify-content:center;font-size:90px;position:relative;overflow:hidden;}
.det-hero-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,transparent 40%,var(--bg) 100%);}
.det-top{display:flex;gap:14px;padding:0 16px 16px;align-items:flex-start;}
.det-icon{width:76px;height:76px;border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:38px;flex-shrink:0;border:1px solid var(--border);}
.det-name{font-size:22px;font-weight:900;margin-bottom:3px;}
.det-dev{font-size:12px;color:var(--txt2);}
.det-badges{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;}
.det-dl-btn{display:block;width:calc(100% - 32px);margin:0 16px 20px;padding:15px;border-radius:14px;background:linear-gradient(135deg,var(--acc),#9b59b6);color:#fff;font-size:16px;font-weight:900;border:none;cursor:pointer;text-align:center;}
.det-dl-btn:active{opacity:.82;}
.det-dl-btn.done{background:var(--card);color:var(--acc);border:1.5px solid var(--acc);}
.stats-row{display:flex;margin:0 16px 20px;background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;}
.stat{flex:1;text-align:center;padding:14px 6px;border-right:1px solid var(--border);}
.stat:last-child{border-right:none;}
.stat-v{font-size:15px;font-weight:800;}
.stat-l{font-size:9px;color:var(--txt2);letter-spacing:1px;margin-top:3px;}
.sec-pad{padding:0 16px;margin-bottom:20px;}
.sec-head{font-size:14px;font-weight:800;margin-bottom:10px;}
.screenshots{display:flex;gap:10px;overflow-x:auto;scrollbar-width:none;padding-bottom:4px;}
.screenshots::-webkit-scrollbar{display:none;}
.ss-item{flex-shrink:0;width:140px;height:90px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:36px;border:1px solid var(--border);}
.det-desc{font-size:13px;color:var(--txt2);line-height:1.75;white-space:pre-line;}
.det-desc.collapsed{display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;white-space:normal;}
.read-more{font-size:12px;font-weight:800;color:var(--acc);cursor:pointer;margin-top:6px;display:inline-block;}
.review{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:8px;}
.rv-top{display:flex;align-items:center;gap:9px;margin-bottom:7px;}
.rv-avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:900;flex-shrink:0;background:rgba(108,99,255,0.2);}
.rv-name{font-size:13px;font-weight:800;}
.rv-stars{font-size:11px;color:#f9ca24;margin-left:auto;}
.rv-txt{font-size:12px;color:var(--txt2);line-height:1.65;}

#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(70px);background:var(--card);border:1px solid var(--border);border-radius:12px;padding:11px 20px;font-size:13px;font-weight:700;color:var(--txt);z-index:999;transition:transform .3s;white-space:nowrap;pointer-events:none;}
#toast.show{transform:translateX(-50%) translateY(0);}
@keyframes spin{to{transform:rotate(360deg);}}

/* RATING SECTION */
.rate-wrap{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px;}
.rate-title{font-size:13px;font-weight:800;margin-bottom:4px;}
.rate-sub{font-size:11px;color:var(--txt2);margin-bottom:14px;}
.rate-stars{display:flex;gap:8px;justify-content:center;margin-bottom:14px;}
.rate-star{font-size:36px;cursor:pointer;transition:transform .15s;filter:grayscale(1);opacity:.35;-webkit-user-select:none;user-select:none;}
.rate-star.active{filter:none;opacity:1;transform:scale(1.15);}
.rate-star:active{transform:scale(0.9);}
.rate-labels{display:flex;justify-content:space-between;font-size:9px;color:var(--txt2);letter-spacing:.5px;margin-bottom:14px;padding:0 2px;}
.rate-submit{width:100%;padding:12px;border-radius:10px;background:var(--acc);color:#fff;font-size:13px;font-weight:800;border:none;cursor:pointer;letter-spacing:.5px;}
.rate-submit:active{opacity:.8;}
.rate-submit:disabled{background:var(--card);color:var(--txt2);border:1px solid var(--border);cursor:default;}
.rate-done{text-align:center;padding:8px 0;font-size:13px;color:var(--txt2);}
.rate-done span{display:block;font-size:22px;margin-bottom:4px;}
.rate-avg{display:flex;align-items:center;gap:8px;margin-top:12px;padding-top:12px;border-top:1px solid var(--border);}
.rate-avg-num{font-size:32px;font-weight:900;color:#f9ca24;line-height:1;}
.rate-avg-right{flex:1;}
.rate-avg-stars{font-size:16px;color:#f9ca24;letter-spacing:1px;}
.rate-avg-count{font-size:10px;color:var(--txt2);margin-top:2px;}
.bar-row{display:flex;align-items:center;gap:8px;margin-top:8px;}
.bar-lbl{font-size:10px;color:var(--txt2);width:14px;text-align:right;flex-shrink:0;}
.bar-bg{flex:1;height:5px;background:rgba(255,255,255,0.08);border-radius:3px;overflow:hidden;}
.bar-fill{height:100%;background:#f9ca24;border-radius:3px;transition:width .5s ease;}
.bar-cnt{font-size:9px;color:var(--txt2);width:20px;flex-shrink:0;}
</style>
</head>
<body>

<!-- DETAIL PAGE -->
<div id="detail">
  <div class="det-header">
    <div class="back-btn" id="back-btn">←</div>
    <div class="det-hd-title" id="dt-hd-title"></div>
  </div>
  <div class="det-hero" id="dt-hero">
    <div class="det-hero-overlay"></div>
  </div>
  <div class="det-top">
    <div class="det-icon" id="dt-icon"></div>
    <div>
      <div class="det-name" id="dt-name"></div>
      <div class="det-dev" id="dt-dev"></div>
      <div class="det-badges" id="dt-badges"></div>
    </div>
  </div>
  <button class="det-dl-btn" id="dt-dl-btn">⬇ FREE DOWNLOAD</button>
  <div class="stats-row">
    <div class="stat"><div class="stat-v" id="dt-rating"></div><div class="stat-l">RATING</div></div>
    <div class="stat"><div class="stat-v" id="dt-downloads"></div><div class="stat-l">DOWNLOADS</div></div>
    <div class="stat"><div class="stat-v" id="dt-size"></div><div class="stat-l">SIZE</div></div>
    <div class="stat"><div class="stat-v" id="dt-age"></div><div class="stat-l">AGE</div></div>
  </div>
  <div class="sec-pad">
    <div class="sec-head">📸 Screenshots</div>
    <div class="screenshots" id="dt-ss"></div>
  </div>
  <div class="sec-pad">
    <div class="sec-head">📝 About</div>
    <div class="det-desc collapsed" id="dt-desc"></div>
    <span class="read-more" id="read-more">Read more ▾</span>
  </div>
  <div class="sec-pad" id="rating-section">
    <div class="sec-head">⭐ Rate this game</div>
    <div class="rate-wrap">
      <!-- Average display -->
      <div class="rate-avg">
        <div class="rate-avg-num" id="avg-num">—</div>
        <div class="rate-avg-right">
          <div class="rate-avg-stars" id="avg-stars">☆☆☆☆☆</div>
          <div class="rate-avg-count" id="avg-count">No ratings yet</div>
          <div id="bars-wrap" style="margin-top:6px;"></div>
        </div>
      </div>
      <div style="border-top:1px solid var(--border);margin:14px 0;"></div>
      <!-- User rating input -->
      <div id="rate-input-wrap">
        <div class="rate-title">Your Rating</div>
        <div class="rate-sub">Tap a star to rate</div>
        <div class="rate-stars" id="rate-stars">
          <span class="rate-star" data-v="1">★</span>
          <span class="rate-star" data-v="2">★</span>
          <span class="rate-star" data-v="3">★</span>
          <span class="rate-star" data-v="4">★</span>
          <span class="rate-star" data-v="5">★</span>
        </div>
        <div class="rate-labels">
          <span>Terrible</span><span>Bad</span><span>Okay</span><span>Good</span><span>Amazing!</span>
        </div>
        <button class="rate-submit" id="rate-submit-btn" disabled>Select a star first</button>
      </div>
      <div id="rate-done-wrap" style="display:none">
        <div class="rate-done"><span>🎉</span>Thanks for rating!</div>
      </div>
    </div>
  </div>
</div>

<!-- MAIN -->
<div class="header">
  <div class="logo">Game<span>Zone</span></div>
  <div class="search-box">
    <span style="font-size:16px;color:var(--txt2)">🔍</span>
    <input id="search" type="text" placeholder="Search games...">
    <span class="clear-btn" id="clear-btn">✕</span>
  </div>
</div>
<div class="main">
  <div class="section-title">🎮 All Games</div>
  <div id="game-list"></div>
</div>
<div id="toast"></div>

<script>
// ── JSONBIN CONFIG ────────────────────────────────────────
var BIN_ID='69bb8782aa77b81da9fa3e02';
var API_KEY='$2a$10$UNjdgsxc5bXnQUgJ1lZ5A.FXP5BgU5SrURfw2qtwp6xD5K8PI/hZC';
var API_URL='https://api.jsonbin.io/v3/b/'+BIN_ID;

var GAMES=[];
var installed=[];var searchQ='';var descExpanded=false;var curGame=null;

// ── LOAD GAMES FROM JSONBIN ───────────────────────────────
function loadGames(){
  var el=document.getElementById('game-list');
  el.innerHTML='<div class="empty"><div class="empty-ico" style="font-size:32px;animation:spin 1s linear infinite;display:inline-block">⏳</div><div class="empty-txt" style="margin-top:8px">Loading games...</div></div>';
  fetch(API_URL+'/latest',{
    headers:{'X-Master-Key':API_KEY,'X-Bin-Meta':'false'}
  })
  .then(function(r){return r.json();})
  .then(function(data){
    GAMES=data.games||[];
    renderList();
  })
  .catch(function(){
    el.innerHTML='<div class="empty"><div class="empty-ico">⚠️</div><div class="empty-txt">Failed to load<br><span style="font-size:12px;opacity:.6">Check your connection</span></div></div>';
  });
}

// ── SAVE GAMES TO JSONBIN ─────────────────────────────────
function saveGames(callback){
  fetch(API_URL,{
    method:'PUT',
    headers:{'Content-Type':'application/json','X-Master-Key':API_KEY},
    body:JSON.stringify({games:GAMES})
  })
  .then(function(){if(callback)callback();})
  .catch(function(){showToast('❌ Save failed — check connection');});
}

function stars(r){var n=parseFloat(r),f=Math.floor(n),e=5-f;return '★'.repeat(f)+'☆'.repeat(e);}

function renderList(){
  var q=searchQ.toLowerCase();
  var list=GAMES.filter(function(g){return !q||g.name.toLowerCase().includes(q)||g.dev.toLowerCase().includes(q);});
  var el=document.getElementById('game-list');el.innerHTML='';
  if(!list.length){
    el.innerHTML=searchQ
      ?'<div class="empty"><div class="empty-ico">🔍</div><div class="empty-txt">No results for "'+searchQ+'"</div></div>'
      :'<div class="empty"><div class="empty-ico">🎮</div><div class="empty-txt">No games yet<br><span style="font-size:12px;opacity:.6">Check back soon!</span></div></div>';
    return;
  }
  list.forEach(function(g){
    var inst=installed.includes(g.id);
    var d=document.createElement('div');d.className='game-card';
    d.innerHTML='<div class="g-icon" style="background:'+g.bg+'">'+g.icon+'</div>'+
      '<div class="g-info"><div class="g-name">'+g.name+'</div><div class="g-dev">'+g.dev+'</div>'+
      '<div class="g-meta"><span class="g-stars">'+stars(g.rating)+'</span><span class="g-rating">'+g.rating+'</span>'+
      '<span class="g-size">• '+g.size+'</span>'+
      g.badges.map(function(b){return '<span class="g-badge '+b.c+'">'+b.t+'</span>';}).join('')+'</div></div>'+
      '<button class="dl-btn'+(inst?' done':'')+'" data-id="'+g.id+'">'+(inst?'OPEN':'GET')+'</button>';
    d.querySelector('.dl-btn').addEventListener('click',function(e){e.stopPropagation();doDownload(g.id);});
    d.addEventListener('click',function(){openDetail(g.id);});
    el.appendChild(d);
  });
}

function openDetail(id){
  var g=GAMES.find(function(x){return x.id===id;});if(!g)return;
  curGame=g;descExpanded=false;
  document.getElementById('dt-hd-title').textContent=g.name;
  var hero=document.getElementById('dt-hero');
  hero.innerHTML='<span style="font-size:90px;position:relative;z-index:1;">'+g.icon+'</span><div class="det-hero-overlay"></div>';
  hero.style.background=g.bg;
  document.getElementById('dt-icon').style.background=g.bg;
  document.getElementById('dt-icon').textContent=g.icon;
  document.getElementById('dt-name').textContent=g.name;
  document.getElementById('dt-dev').textContent=g.dev;
  document.getElementById('dt-badges').innerHTML=g.badges.map(function(b){return '<span class="g-badge '+b.c+'">'+b.t+'</span>';}).join('');
  document.getElementById('dt-rating').textContent='⭐ '+g.rating;
  document.getElementById('dt-downloads').textContent=g.downloads;
  document.getElementById('dt-size').textContent=g.size;
  document.getElementById('dt-age').textContent=g.age;
  var ss=document.getElementById('dt-ss');ss.innerHTML='';
  g.ss.forEach(function(s){var d=document.createElement('div');d.className='ss-item';d.style.background=s.b;d.textContent=s.i;ss.appendChild(d);});
  var desc=document.getElementById('dt-desc');desc.textContent=g.desc;desc.className='det-desc collapsed';
  document.getElementById('read-more').textContent='Read more ▾';
  var inst=installed.includes(g.id);
  var dlb=document.getElementById('dt-dl-btn');
  dlb.textContent=inst?'✓ INSTALLED':'⬇ FREE DOWNLOAD';
  dlb.className='det-dl-btn'+(inst?' done':'');
  dlb.onclick=function(){doDownload(g.id);};
  initRatingUI(g.id);
  document.getElementById('detail').classList.add('show');
  document.getElementById('detail').scrollTop=0;
}

document.getElementById('back-btn').addEventListener('click',function(){document.getElementById('detail').classList.remove('show');});

// ── STAR RATING ────────────────────────────────────────────
var RATINGS={};   // {gameId: [array of star values]}
var userRatings={}; // {gameId: star value user gave}
var selectedStar=0;

function initRatingUI(gameId){
  selectedStar=userRatings[gameId]||0;
  // Reset stars
  var starEls=document.querySelectorAll('.rate-star');
  starEls.forEach(function(s){s.classList.toggle('active',parseInt(s.dataset.v)<=selectedStar);});
  // Show done or input
  var hasDone=userRatings[gameId];
  document.getElementById('rate-input-wrap').style.display=hasDone?'none':'block';
  document.getElementById('rate-done-wrap').style.display=hasDone?'block':'none';
  var btn=document.getElementById('rate-submit-btn');
  btn.disabled=selectedStar===0;
  btn.textContent=selectedStar?'Submit '+selectedStar+' star'+(selectedStar>1?'s':''):'Select a star first';
  updateAvgDisplay(gameId);
}

function updateAvgDisplay(gameId){
  var arr=RATINGS[gameId]||[];
  var avgEl=document.getElementById('avg-num');
  var avgStarsEl=document.getElementById('avg-stars');
  var avgCountEl=document.getElementById('avg-count');
  var barsWrap=document.getElementById('bars-wrap');
  if(!arr.length){
    avgEl.textContent='—';avgStarsEl.textContent='☆☆☆☆☆';
    avgCountEl.textContent='No ratings yet';barsWrap.innerHTML='';return;
  }
  var sum=arr.reduce(function(a,b){return a+b;},0);
  var avg=(sum/arr.length).toFixed(1);
  avgEl.textContent=avg;
  var full=Math.round(parseFloat(avg));
  avgStarsEl.textContent='★'.repeat(full)+'☆'.repeat(5-full);
  avgCountEl.textContent=arr.length+' rating'+(arr.length>1?'s':'');
  // Bars 5→1
  barsWrap.innerHTML='';
  [5,4,3,2,1].forEach(function(n){
    var cnt=arr.filter(function(x){return x===n;}).length;
    var pct=arr.length?Math.round(cnt/arr.length*100):0;
    var row=document.createElement('div');row.className='bar-row';
    row.innerHTML='<span class="bar-lbl">'+n+'</span>'+
      '<div class="bar-bg"><div class="bar-fill" style="width:'+pct+'%"></div></div>'+
      '<span class="bar-cnt">'+cnt+'</span>';
    barsWrap.appendChild(row);
  });
  // Also update stat box rating
  document.getElementById('dt-rating').textContent='⭐ '+avg;
}

// Star tap
document.querySelectorAll('.rate-star').forEach(function(s){
  s.addEventListener('click',function(){
    selectedStar=parseInt(this.dataset.v);
    document.querySelectorAll('.rate-star').forEach(function(x){
      x.classList.toggle('active',parseInt(x.dataset.v)<=selectedStar);
    });
    var btn=document.getElementById('rate-submit-btn');
    btn.disabled=false;
    btn.textContent='Submit '+selectedStar+' star'+(selectedStar>1?'s':'');
  });
  // Hover preview on desktop
  s.addEventListener('mouseenter',function(){
    var v=parseInt(this.dataset.v);
    document.querySelectorAll('.rate-star').forEach(function(x){
      x.style.opacity=parseInt(x.dataset.v)<=v?'0.9':'0.25';
    });
  });
  s.addEventListener('mouseleave',function(){
    document.querySelectorAll('.rate-star').forEach(function(x){
      x.style.opacity='';
    });
  });
});

// Submit
document.getElementById('rate-submit-btn').addEventListener('click',function(){
  if(!curGame||selectedStar===0)return;
  var id=curGame.id;
  userRatings[id]=selectedStar;
  if(!RATINGS[id])RATINGS[id]=[];
  RATINGS[id].push(selectedStar);
  document.getElementById('rate-input-wrap').style.display='none';
  document.getElementById('rate-done-wrap').style.display='block';
  updateAvgDisplay(id);
  showToast('⭐ Rated '+selectedStar+' star'+(selectedStar>1?'s':'')+' — Thanks!');
  // Update list card rating display
  renderList();
});

document.getElementById('read-more').addEventListener('click',function(){
  var desc=document.getElementById('dt-desc');
  descExpanded=!descExpanded;
  desc.className='det-desc'+(descExpanded?'':' collapsed');
  this.textContent=descExpanded?'Show less ▴':'Read more ▾';
});

function doDownload(id){
  var g=GAMES.find(function(x){return x.id===id;});if(!g)return;
  if(!installed.includes(id))installed.push(id);
  var btn=document.querySelector('.dl-btn[data-id="'+id+'"]');
  if(btn){btn.textContent='OPEN';btn.classList.add('done');}
  if(curGame&&curGame.id===id){var dlb=document.getElementById('dt-dl-btn');dlb.textContent='✓ INSTALLED';dlb.className='det-dl-btn done';}
  showToast('⬇ Downloading '+g.name+'...');
  if(g.url){setTimeout(function(){window.location.href=g.url;},600);}
  else{setTimeout(function(){showToast('✅ '+g.name+' downloaded!');},1800);}
}

var si=document.getElementById('search'),cb=document.getElementById('clear-btn');
si.addEventListener('input',function(){searchQ=si.value;cb.style.display=searchQ?'block':'none';renderList();});
cb.addEventListener('click',function(){si.value='';searchQ='';cb.style.display='none';renderList();si.focus();});

var tt=null;
function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');if(tt)clearTimeout(tt);tt=setTimeout(function(){t.classList.remove('show');},2500);}

// ── INIT ──────────────────────────────────────────────────
loadGames();
</script>
</body>
